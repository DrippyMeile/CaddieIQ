<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CaddieIQ</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f7f4;--bg3:#f0efe9;
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --border:#e0dfd8;--border2:#cccbc4;
  --blue:#378ADD;--blue-bg:#E6F1FB;--blue-dark:#0C447C;
  --green:#3B6D11;--green-bg:#EAF3DE;--green-dark:#27500A;
  --amber:#BA7517;--amber-bg:#FAEEDA;--amber-dark:#633806;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-dark:#791F1F;
  --r:8px;--rl:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);font-size:14px;line-height:1.5}
.app{max-width:920px;margin:0 auto}
header{background:var(--bg);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.logo{font-size:18px;font-weight:700;letter-spacing:-.3px}.logo span{color:var(--blue)}
nav{display:flex;gap:2px;flex-wrap:wrap}
.nb{padding:6px 13px;border:none;background:transparent;cursor:pointer;font-size:13px;color:var(--text2);border-radius:var(--r);font-family:inherit}
.nb:hover{background:var(--bg2)}.nb.active{background:var(--bg2);color:var(--text);font-weight:500}
.main{padding:24px}
.view{display:none}.view.active{display:block}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:20px;margin-bottom:16px}
.ct{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
.sl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:block}
.g2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.m{background:var(--bg2);border-radius:var(--r);padding:14px 16px}
.mv{font-size:26px;font-weight:700;line-height:1}.ml{font-size:11px;color:var(--text3);margin-top:4px}.ms{font-size:11px;margin-top:2px;font-weight:600}
.sr{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.sr:last-child{border-bottom:none}.sl2{color:var(--text2)}.sv{font-weight:500}
.good{color:var(--green)}.bad{color:var(--red)}.warn{color:var(--amber)}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
.bg{background:var(--green-bg);color:var(--green-dark)}.br{background:var(--red-bg);color:var(--red-dark)}
.ba{background:var(--amber-bg);color:var(--amber-dark)}.bb{background:var(--blue-bg);color:var(--blue-dark)}.bgr{background:var(--bg3);color:var(--text2)}
.btn{padding:9px 18px;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:500;border:1px solid var(--border2);background:var(--bg);color:var(--text);font-family:inherit}
.btn:hover{background:var(--bg2)}.btn-p{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-p:hover{opacity:.9}
.btn-sm{padding:5px 11px;font-size:12px}.btn-danger{background:var(--red-bg);color:var(--red-dark);border-color:var(--red)}
.fl{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;display:block}
.fr{margin-bottom:12px}
input,select{width:100%;padding:9px 11px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit}
input:focus,select:focus{outline:none;border-color:var(--blue)}
.tbr{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.tb{padding:7px 13px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);cursor:pointer;font-size:12px;color:var(--text2);white-space:nowrap;font-family:inherit}
.tb:hover{background:var(--bg2)}.tb.on{background:var(--bg2);color:var(--text);border-color:#999;font-weight:600}
.tb.g{background:var(--green-bg);color:var(--green-dark);border-color:var(--green);font-weight:600}
.tb.r{background:var(--red-bg);color:var(--red-dark);border-color:var(--red);font-weight:600}
.tb.a{background:var(--amber-bg);color:var(--amber-dark);border-color:var(--amber);font-weight:600}
.tb.b{background:var(--blue-bg);color:var(--blue-dark);border-color:var(--blue);font-weight:600}
.tb.gold{background:#FFF8E7;color:#7a5c00;border-color:#c9a227;font-weight:700}
.sbtn{width:32px;height:32px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);cursor:pointer;font-size:16px;font-weight:700;color:var(--text);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit}
.sbtn:hover{background:var(--bg2)}
.sdisp{width:44px;height:32px;border:1px solid var(--border2);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0;background:var(--bg)}
.pw{background:var(--bg3);border-radius:3px;height:3px;margin-bottom:16px;overflow:hidden}
.pf{height:100%;border-radius:3px;background:var(--blue);transition:width .3s}
.step{display:none}.step.active{display:block}
.hc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:10px}
.hh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.hn{font-size:16px;font-weight:700}
.gp{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700}
.div{border:none;border-top:1px solid var(--border);margin:12px 0}
.fll{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;display:block;font-weight:700}
.rr{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.rr:last-child{border-bottom:none}
.sc{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700}
.br2{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:12px}
.bl{width:80px;color:var(--text2);flex-shrink:0;font-size:11px}
.bt{flex:1;background:var(--bg3);border-radius:3px;height:8px;overflow:hidden}
.bf{height:100%;border-radius:3px}
.bv{width:60px;text-align:right;font-weight:600;flex-shrink:0;font-size:11px}
.tok{color:var(--green);font-weight:700}.tbd{color:var(--red);font-weight:700}
.es{text-align:center;padding:48px 24px;color:var(--text3)}
.es h3{font-size:16px;color:var(--text2);margin-bottom:8px}
.nbs{display:flex;gap:8px;margin-top:16px}
.ld{text-align:center;padding:40px;color:var(--text3);font-size:13px}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a1a;color:#fff;padding:12px 20px;border-radius:var(--rl);font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.lw{max-width:380px;margin:80px auto;padding:0 16px}
.lw .card{padding:32px}
.lt{font-size:22px;font-weight:700;margin-bottom:4px}
.ls{color:var(--text2);margin-bottom:24px;font-size:13px}
.ts{display:flex;margin-bottom:20px;border:1px solid var(--border2);border-radius:var(--r);overflow:hidden}
.ts button{flex:1;padding:8px;border:none;background:transparent;cursor:pointer;font-size:13px;color:var(--text2);font-family:inherit}
.ts button.active{background:var(--blue);color:#fff;font-weight:600}
.pdg{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:5px;margin-bottom:10px}
/* scorecard table */
.sc-table{width:100%;border-collapse:collapse;font-size:12px}
.sc-table th{background:var(--bg2);padding:6px 8px;text-align:center;font-weight:700;font-size:11px;color:var(--text2);border-bottom:1px solid var(--border)}
.sc-table td{padding:6px 8px;text-align:center;border-bottom:1px solid var(--border)}
.sc-table tr:last-child td{border-bottom:none}
.sc-table .hl{font-weight:700;background:var(--bg2)}
/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--bg);border-radius:var(--rl);padding:28px;max-width:480px;width:90%;max-height:90vh;overflow-y:auto}
.modal h3{font-size:17px;font-weight:700;margin-bottom:8px}
.modal p{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6}
/* confirm dialog */
.confirm-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:center;justify-content:center}
.confirm-bg.open{display:flex}
.confirm-box{background:var(--bg);border-radius:var(--rl);padding:24px;max-width:360px;width:90%}
.confirm-box h4{font-size:15px;font-weight:700;margin-bottom:8px}
.confirm-box p{font-size:13px;color:var(--text2);margin-bottom:18px}
.confirm-btns{display:flex;gap:8px;justify-content:flex-end}
</style>
</head>
<body>

<div id="login-screen" style="display:none">
  <div class="lw">
    <div class="card">
      <div class="lt">Caddie<span style="color:var(--blue)">IQ</span></div>
      <div class="ls">Golf Performance Diagnostic Tool</div>
      <div class="ts">
        <button class="active" id="tab-login" onclick="switchAuth('login')">Sign in</button>
        <button id="tab-signup" onclick="switchAuth('signup')">Create account</button>
      </div>
      <div id="auth-login">
        <div class="fr"><label class="fl">Name</label><input type="text" id="login-name" placeholder="Your name"></div>
        <div class="fr"><label class="fl">Password</label><input type="password" id="login-pw" placeholder="Your password"></div>
        <button class="btn btn-p" style="width:100%;margin-top:8px" onclick="doLogin()">Sign in</button>
      </div>
      <div id="auth-signup" style="display:none">
        <div class="fr"><label class="fl">Name</label><input type="text" id="signup-name" placeholder="Your name"></div>
        <div class="fr"><label class="fl">Password</label><input type="password" id="signup-pw" placeholder="Choose a password"></div>
        <button class="btn btn-p" style="width:100%;margin-top:8px" onclick="doSignup()">Create account</button>
      </div>
      <div id="auth-error" style="color:var(--red);font-size:12px;margin-top:10px;display:none"></div>
    </div>
  </div>
</div>

<div id="main-app" style="display:none">
<header>
  <div class="logo">Caddie<span>IQ</span></div>
  <nav>
    <button class="nb active" id="nav-dashboard" onclick="navTo('dashboard')">Dashboard</button>
    <button class="nb" id="nav-newround" onclick="navTo('newround')">+ New round</button>
    <button class="nb" id="nav-rounds" onclick="navTo('rounds')">Rounds</button>
    <button class="nb" id="nav-stats" onclick="navTo('stats')">Statistics</button>
    <button class="nb" id="nav-tiger" onclick="navTo('tiger')">Tiger Metrics</button>
    <button class="nb" onclick="doLogout()" style="color:var(--text3)">Sign out</button>
  </nav>
</header>
<div class="main app">

<!-- DASHBOARD -->
<div id="view-dashboard" class="view active">
  <div id="dash-loading" class="ld">Loading...</div>
  <div id="dash-empty" class="es" style="display:none">
    <h3>Welcome to CaddieIQ</h3>
    <p>Add your first round to see your performance dashboard</p>
    <button class="btn btn-p" style="margin-top:16px" onclick="navTo('newround')">+ Add round</button>
  </div>
  <div id="dash-content" style="display:none"></div>
</div>

<!-- NEW ROUND -->
<div id="view-newround" class="view">
  <div id="nr-info" class="step active">
    <span class="sl">Step 1/4 — Course info</span>
    <div class="pw"><div class="pf" style="width:25%"></div></div>
    <div class="card">
      <div class="fr">
        <label class="fl">Quick select — home course</label>
        <div class="tbr">
          <button class="tb" id="qs-old" onclick="selectCourse('old')">The Scandinavian — Old</button>
          <button class="tb" id="qs-new" onclick="selectCourse('new')">The Scandinavian — New</button>
        </div>
      </div>
      <div class="fr"><label class="fl">Course</label><input type="text" id="f-course" placeholder="e.g. Rungsted Golf Club"></div>
      <div class="g2">
        <div class="fr"><label class="fl">Date</label><input type="date" id="f-date"></div>
        <div class="fr"><label class="fl">Weather</label><select id="f-weather"><option>Sunny</option><option>Cloudy</option><option>Windy</option><option>Rain</option></select></div>
      </div>
      <div class="g3">
        <div class="fr"><label class="fl">Tee</label><select id="f-tee"><option>Yellow</option><option>Red</option><option>White</option><option>Blue</option></select></div>
        <div class="fr"><label class="fl">Slope</label><input type="number" id="f-slope" placeholder="113" min="55" max="155"></div>
        <div class="fr"><label class="fl">Course rating</label><input type="number" id="f-cr" placeholder="72.0" step="0.1"></div>
      </div>
      <div class="fr"><label class="fl">Handicap index</label><input type="number" id="f-hcp" placeholder="12.4" step="0.1" style="max-width:160px"></div>
    </div>
    <div class="nbs">
      <button class="btn" onclick="cancelRound()">Cancel</button>
      <button class="btn btn-p" onclick="startHoles()">Next — scorecard</button>
    </div>
  </div>
  <div id="nr-holes" class="step">
    <span class="sl" id="hole-step-lbl">Step 2/4 — Holes 1–9</span>
    <div class="pw"><div class="pf" id="hole-prog" style="width:50%"></div></div>
    <div id="holes-wrap"></div>
    <div class="nbs">
      <button class="btn" id="hole-back" onclick="holeBack()">Back</button>
      <button class="btn btn-p" id="hole-next" onclick="holeNext()">Next — holes 10–18</button>
    </div>
  </div>
  <div id="nr-summary" class="step">
    <span class="sl">Step 4/4 — Summary & save</span>
    <div class="pw"><div class="pf" style="width:100%"></div></div>
    <div id="summary-content"></div>
    <div class="nbs">
      <button class="btn" onclick="showHoles(9)">Back</button>
      <button class="btn btn-p" id="save-btn" onclick="saveRound()">Save round</button>
    </div>
  </div>
</div>

<!-- ROUNDS -->
<div id="view-rounds" class="view">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span class="sl" style="margin:0">All rounds</span>
    <button class="btn btn-sm" onclick="exportCSV()" style="color:var(--blue-dark);border-color:var(--blue)">Export CSV</button>
  </div>
  <div id="rounds-loading" class="ld">Loading rounds...</div>
  <div id="rounds-content" style="display:none"><div class="card"><div id="rounds-list"></div></div></div>
</div>

<!-- STATS -->
<div id="view-stats" class="view">
  <div id="stats-loading" class="ld">Calculating...</div>
  <div id="stats-content" style="display:none"></div>
</div>

<!-- TIGER -->
<div id="view-tiger" class="view">
  <div id="tiger-loading" class="ld">Loading...</div>
  <div id="tiger-content" style="display:none"></div>
</div>

<!-- ROUND DETAIL (modal) -->
<div class="modal-bg" id="round-modal">
  <div class="modal" id="round-modal-inner"></div>
</div>

<!-- CONFIRM DIALOG -->
<div class="confirm-bg" id="confirm-bg">
  <div class="confirm-box">
    <h4 id="confirm-title">Are you sure?</h4>
    <p id="confirm-msg"></p>
    <div class="confirm-btns">
      <button class="btn" onclick="confirmResolve(false)">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok" onclick="confirmResolve(true)">Confirm</button>
    </div>
  </div>
</div>

</div>
</div>
<div class="toast" id="toast"></div>

<script>
const SB='https://awtiavhmbxpcsfddylxa.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3dGlhdmhtYnhwY3NmZGR5bHhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MTU3NDksImV4cCI6MjA5MjA5MTc0OX0.7MHiKFDJqODAp-534BxVPDb8I41gmL5cgK0jsjJCXdc';
let CU=null,rounds=[],hd=[],holeGroup=0,charts={},roundDirty=false;
let confirmResolve=()=>{};

// ── SUPABASE ──────────────────────────────────────────────────────────────────
function ah(){return{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'};}
async function sb(path,opts={}){
  const r=await fetch(SB+path,{headers:ah(),...opts});
  if(!r.ok)throw new Error(await r.text());
  const t=await r.text();return t?JSON.parse(t):[];
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
function hp(pw){let h=0;for(let i=0;i<pw.length;i++)h=Math.imul(31,h)+pw.charCodeAt(i)|0;return'h'+Math.abs(h).toString(36)+'x'+pw.length;}
async function doLogin(){
  const n=document.getElementById('login-name').value.trim(),p=document.getElementById('login-pw').value;
  if(!n||!p){showAuthErr('Please fill in name and password');return;}
  try{
    const u=await sb('/rest/v1/users?name=eq.'+encodeURIComponent(n)+'&password_hash=eq.'+encodeURIComponent(hp(p))+'&select=*');
    if(!u.length){showAuthErr('Incorrect name or password');return;}
    CU=u[0];localStorage.setItem('ciq',JSON.stringify(CU));startApp();
  }catch(e){showAuthErr(e.message);}
}
async function doSignup(){
  const n=document.getElementById('signup-name').value.trim(),p=document.getElementById('signup-pw').value;
  if(!n||!p){showAuthErr('Please fill in name and password');return;}
  if(p.length<4){showAuthErr('Password must be at least 4 characters');return;}
  try{
    const ex=await sb('/rest/v1/users?name=eq.'+encodeURIComponent(n)+'&select=id');
    if(ex.length){showAuthErr('That name is already taken');return;}
    const res=await sb('/rest/v1/users',{method:'POST',headers:{...ah(),'Prefer':'return=representation'},body:JSON.stringify({name:n,password_hash:hp(p)})});
    CU=Array.isArray(res)?res[0]:res;localStorage.setItem('ciq',JSON.stringify(CU));startApp();
  }catch(e){showAuthErr(e.message);}
}
function doLogout(){localStorage.removeItem('ciq');CU=null;rounds=[];document.getElementById('main-app').style.display='none';document.getElementById('login-screen').style.display='block';}
function showAuthErr(m){const e=document.getElementById('auth-error');e.textContent=m;e.style.display='block';}
function switchAuth(m){
  document.getElementById('auth-login').style.display=m==='login'?'block':'none';
  document.getElementById('auth-signup').style.display=m==='signup'?'block':'none';
  document.getElementById('auth-error').style.display='none';
  document.getElementById('tab-login').classList.toggle('active',m==='login');
  document.getElementById('tab-signup').classList.toggle('active',m==='signup');
}
function startApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-app').style.display='block';
  document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
  loadRounds().then(renderDashboard);
}

// ── DATA ──────────────────────────────────────────────────────────────────────
async function loadRounds(){
  try{rounds=await sb('/rest/v1/rounds?user_id=eq.'+encodeURIComponent(CU.id)+'&order=date.desc,created_at.desc&select=*');}
  catch(e){rounds=[];showToast('Could not load rounds');}
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
async function navTo(v){
  // If clicking New Round while a round is in progress, resume it
  if(v==='newround'&&roundDirty){
    showView('newround');return;
  }
  // If navigating away from newround while dirty, confirm
  if(v!=='newround'&&roundDirty){
    const ok=await confirmDialog('Leave round?','You have unsaved data. Leave without saving?','Leave');
    if(!ok)return;
    roundDirty=false;hd=[];window._editId=null;resetCourseForm();showStep('info');
  }
  showView(v);
}
function showView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  const el=document.getElementById('nav-'+v);if(el)el.classList.add('active');
  if(v==='dashboard')renderDashboard();
  if(v==='rounds'){document.getElementById('rounds-loading').style.display='block';document.getElementById('rounds-content').style.display='none';loadRounds().then(renderRounds);}
  if(v==='stats'){document.getElementById('stats-loading').style.display='block';document.getElementById('stats-content').style.display='none';loadRounds().then(renderStats);}
  if(v==='tiger'){document.getElementById('tiger-loading').style.display='block';document.getElementById('tiger-content').style.display='none';loadRounds().then(renderTiger);}
}

// ── CONFIRM DIALOG ────────────────────────────────────────────────────────────
function confirmDialog(title,msg,okLabel='Confirm',danger=true){
  return new Promise(resolve=>{
    document.getElementById('confirm-title').textContent=title;
    document.getElementById('confirm-msg').textContent=msg;
    document.getElementById('confirm-ok').textContent=okLabel;
    document.getElementById('confirm-ok').className='btn'+(danger?' btn-danger':'  btn-p');
    document.getElementById('confirm-bg').classList.add('open');
    confirmResolve=function(v){document.getElementById('confirm-bg').classList.remove('open');resolve(v);};
  });
}

// ── COURSE PRESETS ────────────────────────────────────────────────────────────
const COURSES={
  old:{name:'The Scandinavian — Old Course',slope:132,cr:73.1,par:72,tee:'Yellow',
    pars:[4,5,4,4,3,4,4,3,5,5,4,3,4,3,4,3,5,5]},
  new:{name:'The Scandinavian — New Course',slope:151,cr:76.3,par:72,tee:'Yellow',
    pars:[5,3,4,5,3,4,5,4,3,4,4,5,3,4,4,4,3,5]}
};
function selectCourse(key){

const PAR=[4,3,5,4,4,3,5,4,4,4,3,5,4,4,3,5,4,4];
const PD=['<1m','1–2m','2–3m','3–5m','5–10m','10–15m','>15m'];

function newHole(par,i){

function cancelRound(){

        roundDirty=false;hd=[];window._editId=null;

function resetCourseForm(){

function startHoles(){
  // Use preset pars if a course was selected, otherwise default

  const pars=selectedKey?COURSES[selectedKey].pars:PAR;

function showHoles(start){

  document.getElementById('hole-step-lbl').textContent=start===0?'Step 2/4 — Holes 1–9':'Step 3/4 — Holes 10–18';
  document.getElementById('hole-prog').style.width=start===0?'50%':'75%';

}
function holeBack(){if(holeGroup===0)showStep('info');else showHoles(0);}
function holeNext(){if(holeGroup===0)showHoles(9);else{buildSummary();showStep('summary');}}
function showStep(s){document.querySelectorAll('#view-newround .step').forEach(el=>el.classList.remove('active'));document.getElementById('nr-'+s).classList.add('active');}

// ── COLORS ────────────────────────────────────────────────────────────────────
function scc(d){if(d<=-2)return'#185FA5';if(d===-1)return'#3B6D11';if(d===0)return'#888';if(d===1)return'#BA7517';return'#A32D2D';}
function scl(d){if(d<=-2)return'Eagle';if(d===-1)return'Birdie';if(d===0)return'Par';if(d===1)return'Bogey';if(d===2)return'+2';return d>0?'+'+d:''+d;}

// ── BUILD HOLE CARDS ──────────────────────────────────────────────────────────
function buildHoles(start,end){
  const w=document.getElementById('holes-wrap');w.innerHTML='';
  for(let i=start;i<end;i++)w.appendChild(mkHole(i));
}
function mkHole(i){
  const h=hd[i];const d=h.score-h.par;const p3=h.par===3;
  const gs=h.girPlus?'background:#E6F1FB;color:#0C447C':h.gir?'background:#EAF3DE;color:#27500A':'background:#f0efe9;color:#888';
  const gt=h.girPlus?'GIR+':h.gir?'GIR':'No GIR';
  const el=document.createElement('div');el.className='hc';el.id='hcard-'+i;

  // header
  el.innerHTML=`<div class="hh">
    <span class="hn">Hole ${h.hole} <span style="font-size:12px;color:#999;font-weight:400;cursor:pointer" data-action="cpar" data-i="${i}" title="Click to change par">Par ${h.par}</span></span>
    <span class="gp" style="${gs}" id="gp-${i}">${gt}</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
    <button class="sbtn" data-action="as" data-i="${i}" data-d="-1">−</button>
    <div class="sdisp" id="sc-${i}" style="color:${scc(d)}">${h.score}</div>
    <button class="sbtn" data-action="as" data-i="${i}" data-d="1">+</button>
    <span style="font-size:13px;color:#999;min-width:56px" id="dl-${i}">${scl(d)}</span>
    <div style="display:flex;align-items:center;gap:5px;margin-left:auto">
      <span style="font-size:11px;color:#999">Putts</span>
      <button class="sbtn" style="width:28px;height:28px;font-size:13px" data-action="ap" data-i="${i}" data-d="-1">−</button>
      <span id="pt-${i}" style="width:24px;text-align:center;font-size:14px;font-weight:700">${h.putts}</span>
      <button class="sbtn" style="width:28px;height:28px;font-size:13px" data-action="ap" data-i="${i}" data-d="1">+</button>
    </div>
  </div>`;

  const div=()=>{const d=document.createElement('div');d.className='div';return d;};

  // tee section
  if(!p3){
    el.appendChild(div());
    el.appendChild(mkSec(i,'Tee club',['Driver','3 Wood','Hybrid','Iron','Lay-up'],'teeClub','on'));

  el.appendChild(mkApDist(i));
  el.appendChild(mkApRes(i));

  // putt dist
  el.appendChild(div());

  // penalty
  el.appendChild(mkPen(i));
  return el;
}

function mkSec(i,label,opts,key,activeCls){

    r.appendChild(b);
  });

}
function mkTeeRes(i){

  const r=document.createElement('div');r.className='tbr';

function mkPuttDist(i){

// ── EVENT DELEGATION ──────────────────────────────────────────────────────────
document.addEventListener('click',function(e){
  const btn=e.target.closest('[data-action]');if(!btn)return;
  const a=btn.dataset.action,i=parseInt(btn.dataset.i);
  if(a==='cpar'){const p=[3,4,5];hd[i].par=p[(p.indexOf(hd[i].par)+1)%3];rebuildHole(i);return;}
  if(a==='as'){hd[i].score=Math.max(1,hd[i].score+parseInt(btn.dataset.d));updScore(i);return;}
  if(a==='ap'){hd[i].putts=Math.max(0,hd[i].putts+parseInt(btn.dataset.d));document.getElementById('pt-'+i).textContent=hd[i].putts;return;}
  if(a==='apen'){hd[i].penalty=Math.max(0,hd[i].penalty+parseInt(btn.dataset.d));rebuildHole(i);return;}
  if(a==='sf'){hd[i][btn.dataset.key]=btn.dataset.val;setAct(btn,'on');return;}
  if(a==='str'){hd[i].teeMiss=btn.dataset.val;setAct(btn,btn.dataset.cls);return;}
  if(a==='sad'){hd[i].approachDist=btn.dataset.val;setAct(btn,'b');if(hd[i].approachResult==='Green'&&hd[i].par===5){hd[i].girPlus=['100-150','>150'].includes(btn.dataset.val);updGP(i);}return;}
  if(a==='sar'){
    hd[i].approachResult=btn.dataset.val;
    const miss=['Short','Long','Left','Right','Bunker','Water'];
    if(btn.dataset.val==='Green'){setAct(btn,'g');hd[i].gir=true;hd[i].girPlus=hd[i].par===5&&['100-150','>150'].includes(hd[i].approachDist);}
    else if(miss.includes(btn.dataset.val)){setAct(btn,btn.dataset.cls);hd[i].gir=false;hd[i].girPlus=false;}
    updGP(i);rebuildHole(i);return;
  }
  if(a==='ho'){hd[i].holedOut=!hd[i].holedOut;if(hd[i].holedOut){hd[i].putts=0;hd[i].upAndDown=true;}else{hd[i].putts=1;}document.getElementById('pt-'+i).textContent=hd[i].putts;rebuildHole(i);return;}
  if(a==='sud'){const v=btn.dataset.val==='true';hd[i].upAndDown=v;if(v&&hd[i].putts===2)hd[i].putts=1;document.getElementById('pt-'+i).textContent=hd[i].putts;setAct(btn,btn.dataset.cls);return;}
  if(a==='spd'){hd[i].firstPuttDist=btn.dataset.val;setAct(btn,'b');return;}
  if(a==='close-modal'){document.getElementById('round-modal').classList.remove('open');return;}
});

function setAct(btn,cls){
  const p=btn.closest('.tbr,.pdg');if(p)p.querySelectorAll('.tb').forEach(b=>b.className='tb');
  btn.className='tb '+cls;
}
function updScore(i){const d=hd[i].score-hd[i].par;document.getElementById('sc-'+i).textContent=hd[i].score;document.getElementById('sc-'+i).style.color=scc(d);document.getElementById('dl-'+i).textContent=scl(d);}
function updGP(i){
  const el=document.getElementById('gp-'+i);if(!el)return;
  const h=hd[i];
  if(h.girPlus){el.textContent='GIR+';el.style.cssText='background:#E6F1FB;color:#0C447C';}
  else if(h.gir){el.textContent='GIR';el.style.cssText='background:#EAF3DE;color:#27500A';}
  else{el.textContent='No GIR';el.style.cssText='background:#f0efe9;color:#888';}
}
function rebuildHole(i){
  const old=document.getElementById('hcard-'+i);
  if(old&&old.parentNode)old.parentNode.replaceChild(mkHole(i),old);
}

// ── TIGER CALC ────────────────────────────────────────────────────────────────
function calcTiger(holes){
  const th=holes.filter(h=>h.putts>=3).length;
  const sp5=holes.filter(h=>h.par===5&&h.score>=6).length;
  const bi150=holes.filter(h=>(h.score-h.par)===1&&['<50','50-100','100-150'].includes(h.approachDist)).length;
  const b2b=holes.reduce((a,h,i)=>{if(i>0&&(h.score-h.par)===1&&(holes[i-1].score-holes[i-1].par)===1)a++;return a;},0);
  const dbl=holes.filter(h=>h.score-h.par>=2).length;
  const bb=holes.reduce((a,h,i)=>{if(i>0&&(holes[i-1].score-holes[i-1].par)>=1&&(h.score-h.par)<=0)a++;return a;},0);
  return{th,sp5,bi150,b2b,dbl,bb};
}

// ── WHS HANDICAP ──────────────────────────────────────────────────────────────
function calcDiff(score,cr,slope){return Math.round((113/slope*(score-cr))*10)/10;}
function newHCP(oldHCP,score,cr,slope){
  const d=calcDiff(score,cr,slope);
  // simplified WHS: best 8 of last 20, here use single round adjustment
  const adj=Math.round((d-oldHCP)*0.1*10)/10;
  return Math.round((oldHCP+adj)*10)/10;
}

// ── SUMMARY ───────────────────────────────────────────────────────────────────
function buildSummary(){
  const tot=hd.reduce((s,h)=>s+h.score,0),totPar=hd.reduce((s,h)=>s+h.par,0);
  const putts=hd.reduce((s,h)=>s+h.putts,0);
  const gir=hd.filter(h=>h.gir).length,girPlus=hd.filter(h=>h.girPlus).length;
  const fir=hd.filter(h=>h.par>3&&h.teeMiss==='fairway').length,firTot=hd.filter(h=>h.par>3).length;
  const diff=tot-totPar,t=calcTiger(hd);
  const cats={eagle:0,birdie:0,par:0,bogey:0,dbl:0};
  hd.forEach(h=>{const d=h.score-h.par;if(d<=-2)cats.eagle++;else if(d===-1)cats.birdie++;else if(d===0)cats.par++;else if(d===1)cats.bogey++;else cats.dbl++;});
  const bpRows=['<50','50-100','100-150','>150'].map((dv,di)=>{
    const gh=hd.filter(h=>h.gir&&h.approachDist===dv),bird=gh.filter(h=>h.score-h.par<=-1).length;
    const pct=gh.length?Math.round(bird/gh.length*100):0;
    return gh.length?`<div class="br2"><span class="bl">${['<50m','50–100m','100–150m','>150m'][di]}</span><div class="bt"><div class="bf" style="width:${pct}%;background:${pct>=50?'#3B6D11':'#BA7517'}"></div></div><span class="bv">${bird}/${gh.length} (${pct}%)</span></div>`:''}).join('');
  const puttRows=PD.map(d=>{
    const ph=hd.filter(h=>h.firstPuttDist===d),made=ph.filter(h=>h.putts===1).length;
    const pct=ph.length?Math.round(made/ph.length*100):0;
    return ph.length?`<div class="br2"><span class="bl">${d}</span><div class="bt"><div class="bf" style="width:${pct}%;background:#378ADD"></div></div><span class="bv">${made}/${ph.length} (${pct}%)</span></div>`:''}).join('');
  // WHS diff
  const cr=parseFloat(document.getElementById('f-cr').value)||72;
  const slope=parseInt(document.getElementById('f-slope').value)||113;
  const hcp=parseFloat(document.getElementById('f-hcp').value)||0;
  const diff18=calcDiff(tot,cr,slope);
  const newH=newHCP(hcp,tot,cr,slope);
  document.getElementById('summary-content').innerHTML=`
    <div class="card"><div class="ct">Score</div>
      <div class="g4" style="margin-bottom:14px">
        <div class="m"><div class="mv" style="color:${scc(Math.max(-5,Math.min(5,diff)))}">${tot}</div><div class="ml">Score (${diff>0?'+':''}${diff})</div></div>
        <div class="m"><div class="mv">${putts}</div><div class="ml">Putts</div></div>
        <div class="m"><div class="mv">${gir}/18${girPlus?' <small style="font-size:14px">('+girPlus+'×GIR+)</small>':''}</div><div class="ml">GIR</div></div>
        <div class="m"><div class="mv">${fir}/${firTot}</div><div class="ml">Fairways</div></div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
        ${cats.eagle?`<span class="badge bb">Eagle ×${cats.eagle}</span>`:''}
        ${cats.birdie?`<span class="badge bg">Birdie ×${cats.birdie}</span>`:''}
        ${cats.par?`<span class="badge bgr">Par ×${cats.par}</span>`:''}
        ${cats.bogey?`<span class="badge ba">Bogey ×${cats.bogey}</span>`:''}
        ${cats.dbl?`<span class="badge br">+2 ×${cats.dbl}</span>`:''}
      </div>
      <div style="background:var(--blue-bg);border-radius:var(--r);padding:10px 14px;font-size:13px">
        <strong>Score differential:</strong> ${diff18} &nbsp;·&nbsp; <strong>Estimated new HCP:</strong> ${newH} (from ${hcp})
      </div>
    </div>
    ${bpRows?`<div class="card"><div class="ct">Birdie conversion by approach distance</div>${bpRows}</div>`:''}
    ${puttRows?`<div class="card"><div class="ct">Putts made by first putt distance</div>${puttRows}</div>`:''}
    <div class="card"><div class="ct">Tiger Metrics</div>
      <div class="sr"><span class="sl2">3-putts</span><span class="${t.th===0?'tok':'tbd'}">${t.th===0?'None':t.th}</span></div>
      <div class="sr"><span class="sl2">6+ on par 5s</span><span class="${t.sp5===0?'tok':'tbd'}">${t.sp5===0?'None':t.sp5}</span></div>
      <div class="sr"><span class="sl2">Bogeys inside 150m</span><span class="${t.bi150===0?'tok':'tbd'}">${t.bi150===0?'None':t.bi150}</span></div>
      <div class="sr"><span class="sl2">Back-to-back bogeys</span><span class="${t.b2b===0?'tok':'tbd'}">${t.b2b===0?'None':t.b2b}</span></div>
      <div class="sr"><span class="sl2">Doubles</span><span class="${t.dbl===0?'tok':'tbd'}">${t.dbl===0?'None':t.dbl}</span></div>
      <div class="sr"><span class="sl2">Bounce backs</span><span class="${t.bb>0?'tok':'tbd'}">${t.bb>0?t.bb:0}</span></div>
    </div>`;
}

// ── SAVE ──────────────────────────────────────────────────────────────────────
async function saveRound(){
  const btn=document.getElementById('save-btn');btn.textContent='Saving...';btn.disabled=true;
  const tot=hd.reduce((s,h)=>s+h.score,0),totPar=hd.reduce((s,h)=>s+h.par,0);
  const putts=hd.reduce((s,h)=>s+h.putts,0);
  const gir=hd.filter(h=>h.gir).length,girPlus=hd.filter(h=>h.girPlus).length;
  const fir=hd.filter(h=>h.par>3&&h.teeMiss==='fairway').length,firTot=hd.filter(h=>h.par>3).length;
  const tiger=calcTiger(hd);
  const cats={eagle:0,birdie:0,par:0,bogey:0,dbl:0};
  hd.forEach(h=>{const d=h.score-h.par;if(d<=-2)cats.eagle++;else if(d===-1)cats.birdie++;else if(d===0)cats.par++;else if(d===1)cats.bogey++;else cats.dbl++;});
  const cr=parseFloat(document.getElementById('f-cr').value)||72;
  const slope=parseInt(document.getElementById('f-slope').value)||113;
  const hcp=parseFloat(document.getElementById('f-hcp').value)||0;
  const scoreDiff=calcDiff(tot,cr,slope);
  const newHcp=newHCP(hcp,tot,cr,slope);
  const payload={
    user_id:CU.id,
    course:document.getElementById('f-course').value||'Unknown course',
    date:document.getElementById('f-date').value||null,
    weather:document.getElementById('f-weather').value,
    tee:document.getElementById('f-tee').value,
    slope,course_rating:cr,handicap:hcp,score_differential:scoreDiff,new_handicap:newHcp,
    score:tot,par:totPar,putts,gir,gir_plus:girPlus,fir,fir_total:firTot,
    tiger,cats,holes:hd
  };
  try{
    if(window._editId){
      await sb('/rest/v1/rounds?id=eq.'+window._editId,{method:'PATCH',headers:{...ah(),'Prefer':'return=minimal'},body:JSON.stringify(payload)});
      window._editId=null;showToast('Round updated!');
    } else {
      await sb('/rest/v1/rounds',{method:'POST',headers:{...ah(),'Prefer':'return=minimal'},body:JSON.stringify(payload)});
      showToast('Round saved!');
    }
    roundDirty=false;showStep('info');await loadRounds();showView('dashboard');
  }catch(e){showToast('Error: '+e.message);}
  btn.textContent='Save round';btn.disabled=false;
}

// ── DELETE / EDIT ─────────────────────────────────────────────────────────────
async function deleteRound(id,name){
  const ok=await confirmDialog('Delete round','Delete round at '+name+'? This cannot be undone.','Delete');
  if(!ok)return;
  try{
    await sb('/rest/v1/rounds?id=eq.'+id,{method:'DELETE',headers:{...ah(),'Prefer':'return=minimal'}});
    rounds=rounds.filter(r=>String(r.id)!==String(id));
    showToast('Round deleted');renderRounds();
  }catch(e){showToast('Error: '+e.message);}
}
function editRound(id){
  const r=rounds.find(r=>String(r.id)===String(id));if(!r)return;
  hd=r.holes?JSON.parse(JSON.stringify(r.holes)):PAR.map((p,i)=>newHole(p,i));
  document.getElementById('f-course').value=r.course||'';
  document.getElementById('f-date').value=r.date||new Date().toISOString().split('T')[0];
  document.getElementById('f-weather').value=r.weather||'Sunny';
  document.getElementById('f-tee').value=r.tee||'Yellow';
  document.getElementById('f-slope').value=r.slope||113;
  document.getElementById('f-cr').value=r.course_rating||72;
  document.getElementById('f-hcp').value=r.handicap||'';
  window._editId=String(id);roundDirty=true;
  showView('newround');showHoles(0);showStep('holes');
  showToast('Editing round — save to update');
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function renderStats(){
  document.getElementById('stats-loading').style.display='none';
  document.getElementById('stats-content').style.display='block';
  if(!rounds.length){document.getElementById('stats-content').innerHTML='<div class="es"><h3>No data yet</h3></div>';return;}
  const all=rounds.flatMap(r=>r.holes||[]),rn=rounds.length;
  // course filter
  const courses=[...new Set(rounds.map(r=>r.course))];
  const hasCourseFilter=courses.length>1;
  let filterCourse=window._statsCourse||'all';

  function renderStatsFor(fc){
    window._statsCourse=fc;
    const filtRounds=fc==='all'?rounds:rounds.filter(r=>r.course===fc);
    const filtAll=filtRounds.flatMap(r=>r.holes||[]);
    const frn=filtRounds.length;
    if(!frn){document.getElementById('stats-inner').innerHTML='<div class="es"><h3>No rounds for this course</h3></div>';return;}
    const p3=filtAll.filter(h=>h.par===3),p4=filtAll.filter(h=>h.par===4),p5=filtAll.filter(h=>h.par===5);
    const aA=h=>h.length?(h.reduce((s,x)=>s+(x.score-x.par),0)/h.length).toFixed(2):'-';
    const aG=h=>h.length?Math.round(h.filter(x=>x.gir).length/h.length*100)+'%':'-';
    const appR=['<50','50-100','100-150','>150'].map((d,i)=>{const ah=filtAll.filter(h=>h.approachDist===d);const gH=ah.filter(h=>h.gir).length,bH=ah.filter(h=>h.gir&&h.score-h.par<=-1).length;const gP=ah.length?Math.round(gH/ah.length*100):0,bP=gH?Math.round(bH/gH*100):0;return ah.length?`<div class="sr"><span class="sl2">${['<50m','50–100m','100–150m','>150m'][i]} (${ah.length} holes)</span><span class="sv">${gP}% GIR · ${bP}% birdie conv.</span></div>`:''}).join('');
    const md={Left:0,Right:0,Short:0,Long:0,Bunker:0,Water:0};
    filtAll.filter(h=>h.approachResult&&h.approachResult!=='Green').forEach(h=>md[h.approachResult]=(md[h.approachResult]||0)+1);
    const mk=Object.keys(md).filter(k=>md[k]>0);
    const tr={fairway:0,'Rough L':0,'Rough R':0,Bunker:0,OB:0,Water:0};
    filtAll.filter(h=>h.par>3&&h.teeMiss).forEach(h=>tr[h.teeMiss]=(tr[h.teeMiss]||0)+1);
    const tk=Object.keys(tr).filter(k=>tr[k]>0);
    const birdies=filtAll.filter(h=>h.score-h.par<=-1).length,bogeys=filtAll.filter(h=>h.score-h.par===1).length;
    const scr=filtAll.filter(h=>!h.gir),ud=scr.filter(h=>h.upAndDown===true||h.holedOut).length;
    const bb=filtRounds.reduce((s,r)=>s+(r.tiger?.bb||0),0);
    const gH=filtAll.filter(h=>h.gir),p3p=filtAll.filter(h=>h.putts>=3).length;
    const pmRows=PD.map(d=>{const ph=filtAll.filter(h=>h.firstPuttDist===d),made=ph.filter(h=>h.putts===1).length,pct=ph.length?Math.round(made/ph.length*100):0,bc=pct>=80?'#3B6D11':pct>=50?'#378ADD':'#BA7517';return ph.length?`<div class="br2"><span class="bl">${d}</span><div class="bt"><div class="bf" style="width:${pct}%;background:${bc}"></div></div><span class="bv">${made}/${ph.length} (${pct}%)</span></div>`:''}).join('');
    const avgScore=frn?filtRounds.reduce((s,r)=>s+r.score,0)/frn:0;
    destroyCharts();
    document.getElementById('stats-inner').innerHTML=`
      ${frn>=2?`<span class="sl">Score trend${fc!=='all'?' — '+fc:''}</span><div class="card"><div style="position:relative;height:160px"><canvas id="sc2" role="img" aria-label="Score trend">Trend</canvas></div></div>`:''}
      <span class="sl">Par type analysis</span>
      <div class="card">
        <div class="sr"><span class="sl2">Par 3 (${p3.length} holes)</span><span class="sv">Avg ${aA(p3)} · GIR ${aG(p3)}</span></div>
        <div class="sr"><span class="sl2">Par 4 (${p4.length} holes)</span><span class="sv">Avg ${aA(p4)} · GIR ${aG(p4)}</span></div>
        <div class="sr"><span class="sl2">Par 5 (${p5.length} holes)</span><span class="sv">Avg ${aA(p5)} · GIR ${aG(p5)}</span></div>
        <div class="sr"><span class="sl2">Birdie/Bogey ratio</span><span class="sv">${bogeys>0?(birdies/bogeys).toFixed(2):birdies>0?'∞':'—'} (${birdies}/${bogeys})</span></div>
        <div class="sr"><span class="sl2">Scrambling %</span><span class="sv">${scr.length?Math.round(ud/scr.length*100):0}% (${ud}/${scr.length})</span></div>
        <div class="sr"><span class="sl2">Bounce back %</span><span class="sv">${bogeys>0?Math.round(bb/bogeys*100):0}% (${bb}/${bogeys})</span></div>
        <div class="sr"><span class="sl2">Putts per GIR hole</span><span class="sv">${gH.length?(gH.reduce((s,h)=>s+h.putts,0)/gH.length).toFixed(2):'—'}</span></div>
        <div class="sr"><span class="sl2">3-putt %</span><span class="sv">${filtAll.length?Math.round(p3p/filtAll.length*100):0}% (${p3p}/${filtAll.length})</span></div>
      </div>
      <span class="sl">Approach by distance</span>
      <div class="card">${appR||'<span style="color:#999;font-size:13px">No approach data yet</span>'}</div>
      ${pmRows?`<span class="sl">Putt make % by first putt distance</span><div class="card">${pmRows}</div>`:''}
      ${mk.length?`<span class="sl">Approach miss direction</span><div class="card"><div style="position:relative;height:${mk.length*44+60}px"><canvas id="mc" role="img" aria-label="Miss direction">Miss</canvas></div></div>`:''}
      ${tk.length?`<span class="sl">Tee shot results</span><div class="card"><div style="position:relative;height:${tk.length*44+60}px"><canvas id="tec" role="img" aria-label="Tee results">Tee</canvas></div></div>`:''}`;
    setTimeout(()=>{
      if(frn>=2){const rev=[...filtRounds].reverse();charts['s2']=new Chart(document.getElementById('sc2'),{type:'line',data:{labels:rev.map((r,i)=>r.date?new Date(r.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'}):'R'+(i+1)),datasets:[{label:'Score to par',data:rev.map(r=>r.score-r.par),borderColor:'#378ADD',backgroundColor:'rgba(55,138,221,.08)',fill:true,tension:.35,pointRadius:4,pointBackgroundColor:'#378ADD'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{grid:{color:'rgba(0,0,0,.06)'},ticks:{color:'#999',callback:v=>(v>0?'+':'')+v}},x:{grid:{display:false},ticks:{color:'#999',font:{size:11},autoSkip:false,maxRotation:45}}}}});}
      if(mk.length){charts['m']=new Chart(document.getElementById('mc'),{type:'bar',data:{labels:mk,datasets:[{label:'Miss',data:mk.map(k=>md[k]),backgroundColor:'#E24B4A',borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(0,0,0,.06)'},ticks:{color:'#999'}},y:{grid:{display:false},ticks:{color:'#555',font:{size:12}}}}}});}
      if(tk.length){const tc2={fairway:'#3B6D11','Rough L':'#BA7517','Rough R':'#BA7517',Bunker:'#E24B4A',OB:'#A32D2D',Water:'#185FA5'};charts['te']=new Chart(document.getElementById('tec'),{type:'bar',data:{labels:tk,datasets:[{label:'Tee',data:tk.map(k=>tr[k]),backgroundColor:tk.map(k=>tc2[k]||'#888'),borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(0,0,0,.06)'},ticks:{color:'#999'}},y:{grid:{display:false},ticks:{color:'#555',font:{size:12}}}}}});}
    },50);
  }

  const filterHTML=hasCourseFilter?`<div style="margin-bottom:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
    <span style="font-size:12px;color:#999">Filter by course:</span>
    <button class="tb${filterCourse==='all'?' g':''}" onclick="window._statsCourse='all';renderStatsInner()">All courses</button>
    ${courses.map(c=>`<button class="tb${filterCourse===c?' g':''}" onclick="window._statsCourse='${c}';renderStatsInner()">${c.replace('The Scandinavian — ','')}</button>`).join('')}
  </div>`:'';
  document.getElementById('stats-content').innerHTML=filterHTML+'<div id="stats-inner"></div>';
  window.renderStatsInner=()=>renderStatsFor(window._statsCourse||'all');
  renderStatsFor(filterCourse);
}

// ── TIGER VIEW ────────────────────────────────────────────────────────────────
function renderTiger(){
  document.getElementById('tiger-loading').style.display='none';
  document.getElementById('tiger-content').style.display='block';
  if(!rounds.length){document.getElementById('tiger-content').innerHTML='<div class="es"><h3>No data yet</h3></div>';return;}
  const rn=rounds.length,totT={th:0,sp5:0,bi150:0,b2b:0,dbl:0,bb:0};
  rounds.forEach(r=>{if(r.tiger)Object.keys(totT).forEach(k=>totT[k]+=(r.tiger[k]||0));});
  const all=rounds.flatMap(r=>r.holes||[]),bogeys=all.filter(h=>h.score-h.par===1).length;
  const b2bd=rounds.flatMap(r=>{const h=r.holes||[];return h.reduce((a,hole,i)=>{if(i>0&&(hole.score-hole.par)===1&&(h[i-1].score-h[i-1].par)===1)a.push({h1:h[i-1].hole,h2:hole.hole,course:r.course,date:r.date});return a;},[]);});
  destroyCharts();
  document.getElementById('tiger-content').innerHTML=`
    <span class="sl">Tiger Metrics — ${rn} round${rn>1?'s':''}</span>
    <div class="g3" style="margin-bottom:20px">
      ${[['3-putts',totT.th,false],['6+ on par 5s',totT.sp5,false],['Bogeys inside 150m',totT.bi150,false],['Back-to-back bogeys',totT.b2b,false],['Doubles',totT.dbl,false],['Bounce backs',totT.bb,true]].map(([l,v,inv])=>`<div class="m"><div class="mv ${(inv?(v>0):(v===0))?'good':'bad'}">${v}</div><div class="ml">${l}</div><div class="ms ${(inv?(v>0):(v===0))?'good':'bad'}">${(v/rn).toFixed(1)}/round</div></div>`).join('')}
    </div>
    ${rn>=2?`<span class="sl">Trend over rounds</span><div class="card"><div style="position:relative;height:200px"><canvas id="tt" role="img" aria-label="Tiger trend">Tiger</canvas></div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-size:12px;color:#999">
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#A32D2D;margin-right:4px"></span>3-putts</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#E24B4A;margin-right:4px"></span>Doubles</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#BA7517;margin-right:4px"></span>B2B bogeys</span>
    </div></div>`:''}
    ${b2bd.length?`<span class="sl">Back-to-back detail</span><div class="card">${b2bd.map(b=>`<div class="sr"><span class="sl2">${b.course}${b.date?' · '+new Date(b.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'}):''}</span><span class="sv">Hole ${b.h1} + ${b.h2}</span></div>`).join('')}</div>`:''}
    <div style="margin-top:8px"><button class="btn btn-sm" style="color:var(--blue-dark);border-color:var(--blue)" onclick="exportCSV()">Export all rounds CSV</button></div>`;
  if(rn>=2){
    setTimeout(()=>{
      const rev=[...rounds].reverse();
      charts['tt']=new Chart(document.getElementById('tt'),{type:'line',data:{labels:rev.map((r,i)=>r.date?new Date(r.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'}):'R'+(i+1)),datasets:[{label:'3-putts',data:rev.map(r=>r.tiger?.th||0),borderColor:'#A32D2D',borderWidth:2,tension:.3,pointRadius:3,fill:false},{label:'Doubles',data:rev.map(r=>r.tiger?.dbl||0),borderColor:'#E24B4A',borderWidth:2,tension:.3,pointRadius:3,fill:false,borderDash:[5,5]},{label:'B2B',data:rev.map(r=>r.tiger?.b2b||0),borderColor:'#BA7517',borderWidth:2,tension:.3,pointRadius:3,fill:false,borderDash:[3,3]}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,grid:{color:'rgba(0,0,0,.06)'},ticks:{color:'#999',stepSize:1}},x:{grid:{display:false},ticks:{color:'#999',font:{size:11},autoSkip:false,maxRotation:45}}}}});
    },50);
  }
}

function destroyCharts(){Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={};}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}

// ── SUPABASE SCHEMA PATCH ─────────────────────────────────────────────────────
// Add new columns if they don't exist (runs silently)
async function ensureColumns(){
  try{
    await sb('/rest/v1/rpc/exec_sql',{method:'POST',body:JSON.stringify({query:"ALTER TABLE rounds ADD COLUMN IF NOT EXISTS score_differential numeric;ALTER TABLE rounds ADD COLUMN IF NOT EXISTS new_handicap numeric;"})});
  }catch(e){}
}

// ── INIT ──────────────────────────────────────────────────────────────────────
(async function init(){
  const saved=localStorage.getItem('ciq');
  if(saved){
    try{CU=JSON.parse(saved);await loadRounds();startApp();}
    catch(e){localStorage.removeItem('ciq');document.getElementById('login-screen').style.display='block';}
  } else {document.getElementById('login-screen').style.display='block';}
  document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
})();
</script>
